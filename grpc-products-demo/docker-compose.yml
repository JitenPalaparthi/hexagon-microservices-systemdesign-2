services:
  postgres:
    image: postgres:17-alpine
    container_name: grpc-products-postgres
    environment:
      POSTGRES_DB: productsdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d productsdb"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - grpc-products-net

  adminer:
    image: adminer:latest
    container_name: grpc-products-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - grpc-products-net

  product-grpc-server:
    build:
      context: .
      dockerfile: ProductGrpcServer/Dockerfile
    container_name: grpc-products-server
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=productsdb;Username=appuser;Password=apppassword
      ASPNETCORE_Kestrel__Endpoints__Grpc__Url: http://0.0.0.0:8080
      ASPNETCORE_Kestrel__Endpoints__Grpc__Protocols: Http2
      ASPNETCORE_Kestrel__Endpoints__Http__Url: http://0.0.0.0:8081
      ASPNETCORE_Kestrel__Endpoints__Http__Protocols: Http1
    ports:
      - "5001:8080"
      - "5002:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8081/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - grpc-products-net

volumes:
  postgres-data:

networks:
  grpc-products-net:
    driver: bridge
