name: azure-servicebus-dotnet10-point-to-point

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: asb-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "LocalDev!Pass123"
    networks:
      - servicebus-net

  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    platform: linux/amd64
    container_name: servicebus-emulator
    pull_policy: always
    volumes:
      - ./emulator/Config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro
    ports:
      - "5672:5672"
      - "5300:5300"
    environment:
      SQL_SERVER: mssql
      MSSQL_SA_PASSWORD: "LocalDev!Pass123"
      ACCEPT_EULA: "Y"
      EMULATOR_HTTP_PORT: "5300"
      SQL_WAIT_INTERVAL: "15"
    depends_on:
      - mssql
    networks:
      servicebus-net:
        aliases:
          - servicebus-emulator

  order-consumer:
    build:
      context: ./src/OrderConsumer
    environment:
      SERVICEBUS_CONNECTION_STRING: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
      SERVICEBUS_QUEUE: "orders"
      CONSUMER_NAME: "consumer-1"
    depends_on:
      - servicebus-emulator
    networks:
      - servicebus-net
    restart: unless-stopped

  order-producer:
    build:
      context: ./src/OrderProducer
    environment:
      SERVICEBUS_CONNECTION_STRING: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
      SERVICEBUS_QUEUE: "orders"
      SEND_INTERVAL_SECONDS: "2"
    depends_on:
      - servicebus-emulator
      - order-consumer
    networks:
      - servicebus-net
    restart: unless-stopped

networks:
  servicebus-net:
    driver: bridge
