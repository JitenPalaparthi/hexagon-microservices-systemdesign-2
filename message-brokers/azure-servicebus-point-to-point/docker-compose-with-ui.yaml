name: azure-servicebus-dotnet10-point-to-point

x-servicebus-environment: &servicebus-environment
  SERVICEBUS_CONNECTION_STRING: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
  SERVICEBUS_QUEUE: "orders"

services:

  # ============================================================
  # Microsoft SQL Server
  # Required by the Azure Service Bus emulator
  # ============================================================
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: asb-mssql

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "LocalDev!Pass123"
      MSSQL_PID: "Developer"

    ports:
      - "1433:1433"

    volumes:
      - mssql-data:/var/opt/mssql

    networks:
      servicebus-net:
        aliases:
          - mssql

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q 'SELECT 1' >/dev/null 2>&1 || exit 1"
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s

    restart: unless-stopped

  # ============================================================
  # Azure Service Bus Emulator
  # ============================================================
  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    platform: linux/amd64
    container_name: servicebus-emulator
    pull_policy: always

    volumes:
      - ./emulator/Config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro

    ports:
      - "5672:5672"
      - "5300:5300"

    environment:
      SQL_SERVER: "mssql"
      MSSQL_SA_PASSWORD: "LocalDev!Pass123"
      ACCEPT_EULA: "Y"
      EMULATOR_HTTP_PORT: "5300"
      SQL_WAIT_INTERVAL: "15"

    depends_on:
      mssql:
        condition: service_healthy

    networks:
      servicebus-net:
        aliases:
          - servicebus-emulator

    restart: unless-stopped

  # ============================================================
  # CloudBeaver
  # Browser-based SQL Server management UI
  # ============================================================
  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: cloudbeaver

    ports:
      - "8978:8978"

    volumes:
      - cloudbeaver-data:/opt/cloudbeaver/workspace

    depends_on:
      mssql:
        condition: service_healthy

    networks:
      - servicebus-net

    restart: unless-stopped

  # ============================================================
  # .NET 10 Order Consumer
  # ============================================================
  order-consumer:
    build:
      context: ./src/OrderConsumer

    container_name: order-consumer

    environment:
      <<: *servicebus-environment
      CONSUMER_NAME: "consumer-1"
      MAX_CONCURRENT_CALLS: "1"
      PREFETCH_COUNT: "0"

    depends_on:
      servicebus-emulator:
        condition: service_started

    networks:
      - servicebus-net

    restart: unless-stopped

  # ============================================================
  # .NET 10 Order Producer
  # ============================================================
  order-producer:
    build:
      context: ./src/OrderProducer

    container_name: order-producer

    environment:
      <<: *servicebus-environment
      SEND_INTERVAL_SECONDS: "2"

    depends_on:
      servicebus-emulator:
        condition: service_started
      order-consumer:
        condition: service_started

    networks:
      - servicebus-net

    restart: unless-stopped

networks:
  servicebus-net:
    driver: bridge
    name: servicebus-net

volumes:
  mssql-data:
  cloudbeaver-data: