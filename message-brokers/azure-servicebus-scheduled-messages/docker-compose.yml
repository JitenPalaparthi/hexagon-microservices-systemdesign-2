name: azure-servicebus-dotnet10-scheduled-messages

x-app-environment: &app-environment
  SERVICEBUS_CONNECTION_STRING: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
  SERVICEBUS_QUEUE_NAME: "scheduled-orders"

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Local_ServiceBus_2026!"
      MSSQL_PID: "Developer"
    networks:
      - servicebus-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q 'SELECT 1' >/dev/null 2>&1 || exit 1"
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s
    restart: unless-stopped

  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    platform: linux/amd64
    pull_policy: always
    volumes:
      - ./config/Config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro
    ports:
      - "5672:5672"
      - "5300:5300"
    environment:
      SQL_SERVER: mssql
      MSSQL_SA_PASSWORD: "Local_ServiceBus_2026!"
      ACCEPT_EULA: "Y"
      EMULATOR_HTTP_PORT: "5300"
      SQL_WAIT_INTERVAL: "15"
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      servicebus-network:
        aliases:
          - servicebus-emulator
    restart: unless-stopped

  order-consumer:
    build:
      context: .
      dockerfile: src/OrderConsumer/Dockerfile
    environment:
      <<: *app-environment
      CONSUMER_NAME: "scheduled-order-consumer"
      MAX_CONCURRENT_CALLS: "2"
      PREFETCH_COUNT: "0"
    depends_on:
      servicebus-emulator:
        condition: service_started
    networks:
      - servicebus-network
    restart: unless-stopped

  order-scheduler:
    build:
      context: .
      dockerfile: src/OrderScheduler/Dockerfile
    environment:
      <<: *app-environment
      MESSAGE_COUNT: "3"
      FIRST_DELAY_SECONDS: "10"
      DELAY_BETWEEN_MESSAGES_SECONDS: "10"
    depends_on:
      servicebus-emulator:
        condition: service_started
      order-consumer:
        condition: service_started
    networks:
      - servicebus-network

  scheduled-message-canceller:
    profiles: ["cancel-demo"]
    build:
      context: .
      dockerfile: src/ScheduledMessageCanceller/Dockerfile
    environment:
      <<: *app-environment
      CANCEL_AFTER_SECONDS: "5"
      SCHEDULE_DELAY_SECONDS: "30"
    depends_on:
      servicebus-emulator:
        condition: service_started
    networks:
      - servicebus-network

networks:
  servicebus-network:
    driver: bridge
