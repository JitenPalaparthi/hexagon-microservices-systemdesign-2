worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format upstream_log '$remote_addr - $request '
                            'status=$status upstream=$upstream_addr '
                            'upstream_status=$upstream_status '
                            'request_time=$request_time '
                            'upstream_time=$upstream_response_time';

    access_log /var/log/nginx/access.log upstream_log;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;

    upstream dotnet_backends {
        # Default method is round-robin.
        server backend1:8080 max_fails=3 fail_timeout=10s;
        server backend2:8080 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        location = /health {
            access_log off;
            return 200 'nginx healthy\n';
            add_header Content-Type text/plain;
        }

        # Shared route: requests are balanced between backend1 and backend2.
        location /api/shared/ {
            proxy_pass http://dotnet_backends/api/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Request-ID $request_id;
        }

        # Direct route to backend1.
        location /api/backend1/ {
            proxy_pass http://backend1:8080/api/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Request-ID $request_id;
        }

        # Direct route to backend2.
        location /api/backend2/ {
            proxy_pass http://backend2:8080/api/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Request-ID $request_id;
        }

        location / {
            return 200 'Use /api/shared/info, /api/backend1/info, or /api/backend2/info\n';
            add_header Content-Type text/plain;
        }
    }
}
