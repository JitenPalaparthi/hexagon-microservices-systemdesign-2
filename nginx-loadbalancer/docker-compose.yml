services:
  backend1:
    build:
      context: .
      dockerfile: src/BackendApi/Dockerfile
    container_name: dotnet-backend-1
    environment:
      ASPNETCORE_URLS: http://+:8080
      INSTANCE_NAME: backend-1
      INSTANCE_COLOR: blue
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network

  backend2:
    build:
      context: .
      dockerfile: src/BackendApi/Dockerfile
    container_name: dotnet-backend-2
    environment:
      ASPNETCORE_URLS: http://+:8080
      INSTANCE_NAME: backend-2
      INSTANCE_COLOR: green
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    image: nginx:1.27-alpine
    container_name: dotnet-nginx-load-balancer
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend1:
        condition: service_healthy
      backend2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
