name: csharp-servicebus-transactions

services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: sb-transactions-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Strong_Passw0rd_2026!"
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Strong_Passw0rd_2026!' -C -Q 'SELECT 1' || exit 1
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - servicebus-network

  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    platform: linux/amd64
    container_name: servicebus-emulator
    pull_policy: always
    depends_on:
      sql:
        condition: service_healthy
    volumes:
      - ./Config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro
    ports:
      - "5672:5672"
      - "5300:5300"
    environment:
      SQL_SERVER: sql
      MSSQL_SA_PASSWORD: "Strong_Passw0rd_2026!"
      ACCEPT_EULA: "Y"
      EMULATOR_HTTP_PORT: "5300"
    networks:
      - servicebus-network

  demo:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["tools"]
    depends_on:
      - servicebus-emulator
    environment:
      SERVICE_BUS_CONNECTION_STRING: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
    networks:
      - servicebus-network

networks:
  servicebus-network:
    driver: bridge
