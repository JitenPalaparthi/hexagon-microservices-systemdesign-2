services:
  sqledge:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: interservice-sqledge
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "StrongPassword@123"
    networks:
      - interservice-network

  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    container_name: interservice-servicebus
    pull_policy: always
    volumes:
      - ./servicebus/Config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro
    ports:
      - "5672:5672"
      - "5300:5300"
    environment:
      SQL_SERVER: sqledge
      MSSQL_SA_PASSWORD: "StrongPassword@123"
      ACCEPT_EULA: "Y"
      EMULATOR_HTTP_PORT: "5300"
      SQL_WAIT_INTERVAL: "15"
    depends_on:
      - sqledge
    networks:
      interservice-network:
        aliases:
          - servicebus-emulator

  product-service:
    build:
      context: .
      dockerfile: ProductService/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5001:8080"
    networks:
      - interservice-network

  order-service:
    build:
      context: .
      dockerfile: OrderService/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      Services__ProductService: http://product-service:8080
    ports:
      - "5002:8080"
    depends_on:
      - product-service
    networks:
      - interservice-network

  warehouse-service:
    build:
      context: .
      dockerfile: WarehouseService/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5004:8080"
    networks:
      - interservice-network

  checkout-service:
    build:
      context: .
      dockerfile: CheckoutService/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__ServiceBus: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
      ServiceBus__OrdersTopic: orders-topic
    ports:
      - "5003:8080"
    depends_on:
      - servicebus-emulator
    restart: on-failure
    networks:
      - interservice-network

  inventory-worker:
    build:
      context: .
      dockerfile: InventoryWorker/Dockerfile
    environment:
      ConnectionStrings__ServiceBus: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
      ServiceBus__OrdersTopic: orders-topic
      ServiceBus__Subscription: inventory-subscription
      Services__WarehouseService: http://warehouse-service:8080
    depends_on:
      - servicebus-emulator
      - warehouse-service
    restart: on-failure
    networks:
      - interservice-network

  notification-worker:
    build:
      context: .
      dockerfile: NotificationWorker/Dockerfile
    environment:
      ConnectionStrings__ServiceBus: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
      ServiceBus__OrdersTopic: orders-topic
      ServiceBus__Subscription: notification-subscription
    depends_on:
      - servicebus-emulator
    restart: on-failure
    networks:
      - interservice-network

networks:
  interservice-network:
    driver: bridge
