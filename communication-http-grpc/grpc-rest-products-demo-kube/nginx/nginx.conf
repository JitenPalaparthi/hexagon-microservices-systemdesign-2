events {}

http {
    upstream rest_products {
        least_conn;
        server product-rest-1:8080;
        server product-rest-2:8080;
    }

    upstream grpc_products {
        least_conn;
        server product-grpc-1:8080;
        server product-grpc-2:8080;
    }

    server {
        # Enable HTTP/2 so it can accept both standard HTTP and gRPC traffic
        listen 8080 http2;
        server_name _;

        # 1. HTTP/REST Routing
        location /api/ {
            proxy_pass http://rest_products;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /health/rest {
            proxy_pass http://rest_products/health;
        }

        # 2. gRPC Routing
        # Match by your gRPC package name (e.g., /my.package.ProductService/)
        # or use a catch-all if your REST endpoints are strictly defined under /api/
        location /products.v1.ProductService/ {
            grpc_pass grpc://grpc_products;
            grpc_set_header X-Real-IP $remote_addr;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            grpc_read_timeout 1h;
            grpc_send_timeout 1h;
        }
    }
}