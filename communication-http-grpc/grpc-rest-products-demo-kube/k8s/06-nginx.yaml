apiVersion: v1
kind: Service
metadata:
  name: nginx-gateway
  namespace: products-demo
spec:
  type: NodePort
  selector:
    app: nginx-gateway
  ports:
    - name: rest
      port: 8080
      targetPort: rest
      nodePort: 30080
    - name: grpc
      port: 5000
      targetPort: grpc
      nodePort: 30500
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-gateway
  namespace: products-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-gateway
  template:
    metadata:
      labels:
        app: nginx-gateway
    spec:
      containers:
        - name: nginx
          image: nginx:1.29-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: rest
              containerPort: 8080
            - name: grpc
              containerPort: 5000
          readinessProbe:
            httpGet:
              path: /health/rest
              port: rest
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health/rest
              port: rest
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
