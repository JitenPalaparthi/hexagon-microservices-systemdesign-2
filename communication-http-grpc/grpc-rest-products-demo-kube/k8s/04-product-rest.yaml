apiVersion: v1
kind: Service
metadata:
  name: product-rest
  namespace: products-demo
spec:
  selector:
    app: product-rest
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-rest
  namespace: products-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-rest
  template:
    metadata:
      labels:
        app: product-rest
    spec:
      containers:
        - name: product-rest
          image: products/product-rest:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: ASPNETCORE_URLS
              value: http://0.0.0.0:8080
            - name: ConnectionStrings__Postgres
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: connectionString
            - name: INSTANCE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
