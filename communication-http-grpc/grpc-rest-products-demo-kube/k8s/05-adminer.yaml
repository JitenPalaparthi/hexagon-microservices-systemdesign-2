apiVersion: v1
kind: Service
metadata:
  name: adminer
  namespace: products-demo
spec:
  type: NodePort
  selector:
    app: adminer
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adminer
  namespace: products-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adminer
  template:
    metadata:
      labels:
        app: adminer
    spec:
      containers:
        - name: adminer
          image: adminer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
