apiVersion: v1
kind: Service
metadata:
  name: product-grpc
  namespace: products-demo
spec:
  selector:
    app: product-grpc
  ports:
    - name: grpc
      port: 8080
      targetPort: grpc
    - name: health
      port: 8081
      targetPort: health
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-grpc
  namespace: products-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-grpc
  template:
    metadata:
      labels:
        app: product-grpc
    spec:
      containers:
        - name: product-grpc
          image: products/product-grpc:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 8080
            - name: health
              containerPort: 8081
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: ConnectionStrings__Postgres
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: connectionString
            - name: ASPNETCORE_Kestrel__Endpoints__Grpc__Url
              value: http://0.0.0.0:8080
            - name: ASPNETCORE_Kestrel__Endpoints__Grpc__Protocols
              value: Http2
            - name: ASPNETCORE_Kestrel__Endpoints__Http__Url
              value: http://0.0.0.0:8081
            - name: ASPNETCORE_Kestrel__Endpoints__Http__Protocols
              value: Http1
            - name: INSTANCE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
