services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: productsdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
    ports:
    - 5432:5432
    volumes:
    - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U appuser -d productsdb
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
    - products-net
  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
    - 8081:8080
    depends_on:
      postgres:
        condition: service_healthy
    networks:
    - products-net
  product-grpc-1:
    build:
      context: .
      dockerfile: ProductGrpcServer/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=productsdb;Username=appuser;Password=apppassword
      ASPNETCORE_Kestrel__Endpoints__Grpc__Url: http://0.0.0.0:8080
      ASPNETCORE_Kestrel__Endpoints__Grpc__Protocols: Http2
      ASPNETCORE_Kestrel__Endpoints__Http__Url: http://0.0.0.0:8081
      ASPNETCORE_Kestrel__Endpoints__Http__Protocols: Http1
      INSTANCE_NAME: grpc-1
    depends_on:
      postgres:
        condition: service_healthy
    networks:
    - products-net
    healthcheck:
      test:
      - CMD-SHELL
      - curl --fail --silent http://localhost:8081/health >/dev/null || exit 1
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
  product-grpc-2:
    build:
      context: .
      dockerfile: ProductGrpcServer/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=productsdb;Username=appuser;Password=apppassword
      ASPNETCORE_Kestrel__Endpoints__Grpc__Url: http://0.0.0.0:8080
      ASPNETCORE_Kestrel__Endpoints__Grpc__Protocols: Http2
      ASPNETCORE_Kestrel__Endpoints__Http__Url: http://0.0.0.0:8081
      ASPNETCORE_Kestrel__Endpoints__Http__Protocols: Http1
      INSTANCE_NAME: grpc-2
      SkipDatabaseInitialization: 'true'
    depends_on:
      product-grpc-1:
        condition: service_healthy
    networks:
    - products-net
    healthcheck:
      test:
      - CMD-SHELL
      - curl --fail --silent http://localhost:8081/health >/dev/null || exit 1
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
  product-rest-1:
    build:
      context: .
      dockerfile: ProductRestServer/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=productsdb;Username=appuser;Password=apppassword
      INSTANCE_NAME: rest-1
    depends_on:
      product-grpc-1:
        condition: service_healthy
    networks:
    - products-net
    healthcheck:
      test:
      - CMD-SHELL
      - curl --fail --silent http://localhost:8080/health >/dev/null || exit 1
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
  product-rest-2:
    build:
      context: .
      dockerfile: ProductRestServer/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=productsdb;Username=appuser;Password=apppassword
      INSTANCE_NAME: rest-2
    depends_on:
      product-grpc-1:
        condition: service_healthy
    networks:
    - products-net
    healthcheck:
      test:
      - CMD-SHELL
      - curl --fail --silent http://localhost:8080/health >/dev/null || exit 1
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
  nginx:
    image: nginx:1.29-alpine
    ports:
    - 8080:8080
    - 5001:5000
    volumes:
    - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      product-rest-1:
        condition: service_healthy
      product-rest-2:
        condition: service_healthy
      product-grpc-1:
        condition: service_healthy
      product-grpc-2:
        condition: service_healthy
    networks:
    - products-net
volumes:
  postgres-data: null
networks:
  products-net:
    driver: bridge
