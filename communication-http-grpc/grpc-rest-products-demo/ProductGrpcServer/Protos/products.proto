syntax = "proto3";

package products.v1;
option csharp_namespace = "ProductGrpcServer.Grpc";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service ProductService {
  // Unary: one request, one response.
  rpc GetProduct(GetProductRequest) returns (ProductReply);
  rpc CreateProduct(CreateProductRequest) returns (ProductReply);

  // Server streaming: one request, many products returned one by one.
  rpc StreamProducts(StreamProductsRequest) returns (stream ProductReply);

  // Client streaming: many products sent by the client, one summary returned.
  rpc CreateProducts(stream CreateProductRequest) returns (CreateProductsSummary);

  // Bidirectional streaming: client sends price updates and receives one
  // acknowledgement for every update on the same open HTTP/2 stream.
  rpc UpdateProductPrices(stream PriceUpdateRequest)
      returns (stream PriceUpdateReply);

  // Convenience unary method for checking all persisted products in one response.
  rpc ListProducts(google.protobuf.Empty) returns (ProductListReply);
}

message GetProductRequest {
  int32 id = 1;
}

message CreateProductRequest {
  string name = 1;
  string description = 2;
  string category = 3;
  double price = 4;
  int32 available_quantity = 5;
}

message ProductReply {
  int32 id = 1;
  string name = 2;
  string description = 3;
  string category = 4;
  double price = 5;
  int32 available_quantity = 6;
  google.protobuf.Timestamp created_at_utc = 7;
}

message StreamProductsRequest {
  string category = 1;
  int32 delay_milliseconds = 2;
}

message CreateProductsSummary {
  int32 received_count = 1;
  int32 created_count = 2;
  int32 failed_count = 3;
  repeated int32 created_product_ids = 4;
  repeated string errors = 5;
}

message PriceUpdateRequest {
  int32 product_id = 1;
  double new_price = 2;
  string reason = 3;
  string correlation_id = 4;
}

message PriceUpdateReply {
  int32 product_id = 1;
  string product_name = 2;
  double previous_price = 3;
  double new_price = 4;
  bool accepted = 5;
  string message = 6;
  string correlation_id = 7;
}

message ProductListReply {
  repeated ProductReply products = 1;
}
