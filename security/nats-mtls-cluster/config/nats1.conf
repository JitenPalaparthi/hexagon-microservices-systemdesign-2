server_name: "nats1"
host: 0.0.0.0
port: 4222
http_port: 8222

# mTLS for application clients.
tls {
  cert_file: "/etc/nats/certs/server.crt"
  key_file:  "/etc/nats/certs/server.key"
  ca_file:   "/etc/nats/certs/ca.crt"
  verify: true
  min_version: "1.2"
  timeout: 5
}

cluster {
  name: "demo-nats-cluster"
  host: 0.0.0.0
  port: 6222

  routes: [
      nats-route://nats2:6222,
      nats-route://nats3:6222
  ]

  # NATS route TLS is mutually authenticated. Every node acts as both
  # TLS server and TLS client on the route connection.
  tls {
    cert_file: "/etc/nats/certs/server.crt"
    key_file:  "/etc/nats/certs/server.key"
    ca_file:   "/etc/nats/certs/ca.crt"
    min_version: "1.2"
    timeout: 5
  }
}
